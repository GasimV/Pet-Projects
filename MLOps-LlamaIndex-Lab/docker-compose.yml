# =============================================================================
# MLOps-LlamaIndex-Lab — Docker Compose (local development)
# =============================================================================
# Start everything:  docker compose up --build
# Stop:              docker compose down
# =============================================================================

services:
  # ── Qdrant Vector Database ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: llamaindex-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - rag-network
    restart: unless-stopped

  # ── RAG Application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llamaindex-app
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-gemma3:1b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-http://host.docker.internal:11434}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-m3}
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
    depends_on:
      - qdrant
    networks:
      - rag-network
    restart: unless-stopped

networks:
  rag-network:
    name: rag-network
    driver: bridge
