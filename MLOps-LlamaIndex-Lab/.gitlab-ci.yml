# =============================================================================
# MLOps-LlamaIndex-Lab — GitLab CI/CD Pipeline
# =============================================================================
# Stages: lint → test → build → terraform-validate
# Works with both GitLab.com and a local GitLab CE instance.
#
# NOTE: This pipeline validates code quality, runs unit tests, builds the
# Docker image, and checks Terraform config. It does NOT run the full RAG
# pipeline — no Ollama, no Qdrant, no LLM inference happens in CI.
# =============================================================================

workflow:
  rules:
    - when: always

stages:
  - lint
  - test
  - build
  - infra

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PROJECT_DIR: "$CI_PROJECT_DIR/MLOps-LlamaIndex-Lab"

# All jobs run from the MLOps-LlamaIndex-Lab subdirectory
default:
  before_script:
    - cd "$PROJECT_DIR"

# Cache pip downloads between pipeline runs
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .pip-cache/

# ── Lint ─────────────────────────────────────────────────────────────────────

lint:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff==0.9.4
    - ruff check app/ tests/
  allow_failure: false

# ── Test ─────────────────────────────────────────────────────────────────────
# Uses the lightweight Docker requirements (no torch / HuggingFace) plus
# pytest and httpx. Tests do not require Ollama or Qdrant — they exercise
# config loading, health endpoints, and document-service logic only.

test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -r requirements-docker.txt pytest==8.3.4 httpx==0.28.1
    - python -m pytest tests/ -v --tb=short
  allow_failure: false

# ── Build Docker Image ──────────────────────────────────────────────────────
# Builds using the Dockerfile (which installs requirements-docker.txt).
# No torch or HuggingFace packages are pulled into the image.

build:
  stage: build
  image: docker:24.0
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  script:
    - docker build -t llamaindex-lab-app:${CI_COMMIT_SHORT_SHA} .
    - docker tag llamaindex-lab-app:${CI_COMMIT_SHORT_SHA} llamaindex-lab-app:latest
    - echo "Image built and tagged successfully"
  only:
    - main
    - master

# ── Terraform Validate ──────────────────────────────────────────────────────

terraform-validate:
  stage: infra
  image:
    name: hashicorp/terraform:1.7
    entrypoint: [""]
  script:
    - cd infra/terraform
    - terraform init -backend=false
    - terraform fmt -check
    - terraform validate
  allow_failure: true
