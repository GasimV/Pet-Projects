apiVersion: v1
kind: Namespace
metadata:
  name: voice-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-platform-config
data:
  PROJECT_NAME: voice-agent-platform
  ENVIRONMENT: production
  LOG_LEVEL: INFO
  RUNTIME_PROFILE: local-hybrid
  REDIS_URL: redis://redis:6379/0
  POSTGRES_DSN: postgresql+asyncpg://voice:voice@postgres:5432/voice_platform
  QDRANT_URL: http://qdrant:6333
  OLLAMA_BASE_URL: http://ollama:11434
  OLLAMA_CHAT_MODEL: gemma3:270m
  OLLAMA_EMBED_MODEL: bge-m3:latest
  ENABLE_VLLM: "false"
  STT_MODEL: tiny.en
  STT_DEVICE: cpu
  STT_COMPUTE_TYPE: int8
  TTS_PROVIDER: espeak
  TEMPORAL_TARGET: temporal:7233
  TEMPORAL_NAMESPACE: default
  TEMPORAL_TASK_QUEUE: voice-platform
  KNOWLEDGE_DIR: /workspace/knowledge
  DEFAULT_DOMAIN_PACK: starship
  STT_GRPC_TARGET: stt-service:50052
  LLM_GRPC_TARGET: llm-service:50053
  TTS_GRPC_TARGET: tts-service:50054
  TOOL_GRPC_TARGET: tool-service:50055
  RAG_GRPC_TARGET: rag-service:50056
  ORCHESTRATOR_GRPC_HOST: session-orchestrator
  ORCHESTRATOR_GRPC_PORT: "50051"
---
apiVersion: v1
kind: Secret
metadata:
  name: voice-platform-secrets
type: Opaque
stringData:
  LIVEKIT_API_KEY: devkey
  LIVEKIT_API_SECRET: secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        - name: gateway
          image: voice-platform/backend:latest
          command: ["python", "-m", "uvicorn", "gateway_app.main:app", "--host", "0.0.0.0", "--port", "8080", "--app-dir", "apps/gateway"]
          envFrom:
            - configMapRef: { name: voice-platform-config }
            - secretRef: { name: voice-platform-secrets }
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector: { app: gateway }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels: { app: session-orchestrator }
  template:
    metadata:
      labels: { app: session-orchestrator }
    spec:
      containers:
        - name: session-orchestrator
          image: voice-platform/backend:latest
          command: ["python", "apps/session-orchestrator/session_orchestrator_app/main.py"]
          envFrom:
            - configMapRef: { name: voice-platform-config }
            - secretRef: { name: voice-platform-secrets }
          ports:
            - containerPort: 8081
            - containerPort: 50051
---
apiVersion: v1
kind: Service
metadata:
  name: session-orchestrator
spec:
  selector: { app: session-orchestrator }
  ports:
    - name: http
      port: 8081
      targetPort: 8081
    - name: grpc
      port: 50051
      targetPort: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stt-service
spec:
  replicas: 1
  selector:
    matchLabels: { app: stt-service }
  template:
    metadata:
      labels: { app: stt-service }
    spec:
      containers:
        - name: stt-service
          image: voice-platform/backend:latest
          command: ["python", "apps/stt-service/stt_service_app/main.py"]
          envFrom:
            - configMapRef: { name: voice-platform-config }
          ports:
            - containerPort: 8092
            - containerPort: 50052
---
apiVersion: v1
kind: Service
metadata:
  name: stt-service
spec:
  selector: { app: stt-service }
  ports:
    - name: http
      port: 8092
