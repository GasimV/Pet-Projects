---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-agent
spec:
  replicas: 1
  selector:
    matchLabels: { app: livekit-agent }
  template:
    metadata:
      labels: { app: livekit-agent }
    spec:
      containers:
        - name: livekit-agent
          image: voice-platform/backend:latest
          command: ["python", "-m", "uvicorn", "livekit_agent_app.main:app", "--host", "0.0.0.0", "--port", "8091", "--app-dir", "apps/livekit-agent"]
          envFrom:
            - configMapRef: { name: voice-platform-config }
            - secretRef: { name: voice-platform-secrets }
          ports:
            - containerPort: 8091
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: voice }
            - { name: POSTGRES_PASSWORD, value: voice }
            - { name: POSTGRES_DB, value: voice_platform }
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
spec:
  replicas: 1
  selector:
    matchLabels: { app: qdrant }
  template:
    metadata:
      labels: { app: qdrant }
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.15.4
          ports:
            - containerPort: 6333
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
spec:
  selector: { app: qdrant }
  ports:
    - port: 6333
      targetPort: 6333
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
spec:
  replicas: 1
  selector:
    matchLabels: { app: temporal }
  template:
    metadata:
      labels: { app: temporal }
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.27.2
          env:
            - { name: DB, value: postgresql }
            - { name: DB_PORT, value: "5432" }
            - { name: POSTGRES_USER, value: voice }
            - { name: POSTGRES_PWD, value: voice }
            - { name: POSTGRES_SEEDS, value: postgres }
            - { name: DBNAME, value: temporal }
          ports:
            - containerPort: 7233
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
spec:
  selector: { app: temporal }
  ports:
    - port: 7233
      targetPort: 7233
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels: { app: ollama }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.12.2
          ports:
            - containerPort: 11434
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  selector: { app: ollama }
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
spec:
  replicas: 1
  selector:
    matchLabels: { app: livekit }
  template:
    metadata:
      labels: { app: livekit }
    spec:
      containers:
        - name: livekit
          image: livekit/livekit-server:v1.9
          args: ["--config", "/etc/livekit/livekit.yaml"]
          ports:
            - containerPort: 7880
            - containerPort: 7881
---
apiVersion: v1
kind: Service
metadata:
  name: livekit
spec:
  selector: { app: livekit }
  ports:
    - name: http
      port: 7880
      targetPort: 7880
    - name: rtc
      port: 7881
      targetPort: 7881

