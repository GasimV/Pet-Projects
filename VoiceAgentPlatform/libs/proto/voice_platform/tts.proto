syntax = "proto3";

package voice_platform;

import "voice_platform/common.proto";

message SynthesisRequest {
  RequestMeta meta = 1;
  string text = 2;
  string voice = 3;
  bool flush = 4;
}

message SynthesisChunk {
  RequestMeta meta = 1;
  bytes audio = 2;
  string mime_type = 3;
  bool is_final = 4;
}

service TextToSpeech {
  rpc Synthesize(SynthesisRequest) returns (stream SynthesisChunk);
  rpc Health(Empty) returns (HealthReply);
}

