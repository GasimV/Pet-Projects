syntax = "proto3";

package voice_platform;

import "voice_platform/common.proto";

message RagRequest {
  RequestMeta meta = 1;
  string query = 2;
  uint32 top_k = 3;
}

message Citation {
  string source = 1;
  string excerpt = 2;
  float score = 3;
}

message RagReply {
  RequestMeta meta = 1;
  string assembled_context = 2;
  repeated Citation citations = 3;
}

service RetrievalAugmentation {
  rpc Retrieve(RagRequest) returns (RagReply);
  rpc Health(Empty) returns (HealthReply);
}

