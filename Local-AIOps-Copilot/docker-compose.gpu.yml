# ─────────────────────────────────────────────────────────
# docker-compose.gpu.yml — GPU mode for second machine
# ─────────────────────────────────────────────────────────
# Requirements:
#   - NVIDIA GPU (RTX 5080 or similar)
#   - Docker Desktop with WSL2
#   - NVIDIA Container Toolkit installed
#
# Usage: docker compose -f docker-compose.gpu.yml up --build
# For vLLM only:   docker compose -f docker-compose.gpu.yml up --build vllm api-gateway agent-service frontend
# For Triton only: docker compose -f docker-compose.gpu.yml up --build triton api-gateway agent-service frontend
# Side-by-side:    docker compose -f docker-compose.gpu.yml up --build (runs both)

services:
  # ── GPU Inference Backends ──

  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    environment:
      - VLLM_MODEL=${VLLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
    command: >
      --model ${VLLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      --host 0.0.0.0
      --port 8000
      --max-model-len 4096
      --gpu-memory-utilization 0.85
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - model-cache:/root/.cache/huggingface
    networks:
      - copilot-net
    profiles:
      - vllm
      - gpu-all

  triton:
    image: nvcr.io/nvidia/tritonserver:24.03-vllm-python-py3
    ports:
      - "8001:8000"   # HTTP
      - "8002:8001"   # gRPC
      - "8003:8002"   # Metrics
    environment:
      - TRITON_MODEL=${TRITON_MODEL:-llama-3.1-8b}
    command: >
      tritonserver
      --model-repository=/models
      --http-port=8000
      --grpc-port=8001
      --metrics-port=8002
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./infra/triton/model_repository:/models
      - model-cache:/root/.cache/huggingface
    networks:
      - copilot-net
    profiles:
      - triton
      - gpu-all

  # ── Core Application Services ──

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      - LLM_BACKEND=${LLM_BACKEND:-vllm}
      - ENVIRONMENT=gpu
      - REDIS_URL=redis://redis:6379/0
      - AGENT_SERVICE_PORT=50051
      - VLLM_BASE_URL=http://vllm:8000
      - TRITON_HTTP_URL=http://triton:8000
      - TRITON_GRPC_URL=triton:8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - redis
    networks:
      - copilot-net

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
    depends_on:
      - api-gateway
    networks:
      - copilot-net

  agent-service:
    build:
      context: .
      dockerfile: services/agent-service/Dockerfile
    ports:
      - "${AGENT_SERVICE_PORT:-50051}:50051"
    environment:
      - LLM_BACKEND=${LLM_BACKEND:-vllm}
      - ENVIRONMENT=gpu
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - VLLM_BASE_URL=http://vllm:8000
      - VLLM_MODEL=${VLLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - TRITON_HTTP_URL=http://triton:8000
      - TRITON_GRPC_URL=triton:8001
      - TRITON_MODEL=${TRITON_MODEL:-llama-3.1-8b}
    depends_on:
      - redis
    networks:
      - copilot-net

  rag-service:
    build:
      context: .
      dockerfile: services/rag-service/Dockerfile
    ports:
      - "${RAG_SERVICE_PORT:-50052}:50052"
    environment:
      - LLM_BACKEND=${LLM_BACKEND:-vllm}
      - QDRANT_URL=http://qdrant:6333
      - VLLM_BASE_URL=http://vllm:8000
      - ENVIRONMENT=gpu
    depends_on:
      - qdrant
    networks:
      - copilot-net

  mcp-tool-server:
    build:
      context: .
      dockerfile: services/mcp-tool-server/Dockerfile
    ports:
      - "${MCP_SERVER_PORT:-50053}:50053"
    environment:
      - ENVIRONMENT=gpu
    networks:
      - copilot-net

  eval-service:
    build:
      context: .
      dockerfile: services/eval-service/Dockerfile
    ports:
      - "${EVAL_SERVICE_PORT:-50054}:50054"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - ENVIRONMENT=gpu
    depends_on:
      - mlflow
    networks:
      - copilot-net

  release-controller:
    build:
      context: .
      dockerfile: services/release-controller/Dockerfile
    ports:
      - "${RELEASE_CONTROLLER_PORT:-50055}:50055"
    environment:
      - POSTGRES_URL=postgresql://copilot:copilot@postgres:5432/copilot
      - ENVIRONMENT=gpu
    depends_on:
      - postgres
    networks:
      - copilot-net

  # ── Infrastructure ──

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - copilot-net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - copilot-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - copilot-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-data:/mlflow
    networks:
      - copilot-net

  # ── Observability ──

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/docker/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    networks:
      - copilot-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/docker/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - copilot-net

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./infra/docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - copilot-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    ports:
      - "${LOGSTASH_PORT:-5044}:5044"
    volumes:
      - ./infra/docker/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    networks:
      - copilot-net

  # ── Airflow ──

  airflow:
    image: apache/airflow:2.9.0-python3.11
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://copilot:copilot@postgres:5432/copilot
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./services/airflow/dags:/opt/airflow/dags
      - ./services/airflow/plugins:/opt/airflow/plugins
    depends_on:
      - postgres
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@local.dev || true &&
        airflow webserver --port 8080 &
        airflow scheduler
      "
    networks:
      - copilot-net

volumes:
  redis-data:
  postgres-data:
  qdrant-data:
  mlflow-data:
  prometheus-data:
  grafana-data:
  model-cache:

networks:
  copilot-net:
    driver: bridge
