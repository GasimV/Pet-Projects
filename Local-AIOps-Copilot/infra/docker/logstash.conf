input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  if [service] {
    mutate {
      add_field => { "[@metadata][service]" => "%{service}" }
    }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  stdout {
    codec => rubydebug
  }

  # Uncomment for Elasticsearch output:
  # elasticsearch {
  #   hosts => ["elasticsearch:9200"]
  #   index => "aiops-copilot-%{[@metadata][service]}-%{+YYYY.MM.dd}"
  # }
}
