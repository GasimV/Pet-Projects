global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: "mcp-tool-server"
    metrics_path: /metrics
    static_configs:
      - targets: ["mcp-tool-server:50053"]

  - job_name: "eval-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["eval-service:50054"]

  - job_name: "release-controller"
    metrics_path: /metrics
    static_configs:
      - targets: ["release-controller:50055"]
