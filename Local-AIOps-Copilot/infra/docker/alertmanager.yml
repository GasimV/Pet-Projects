global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - match:
        severity: critical
      receiver: "critical"

receivers:
  - name: "default"
    # In a real setup, configure email/slack/pagerduty here
  - name: "critical"
    # Critical alerts receiver
