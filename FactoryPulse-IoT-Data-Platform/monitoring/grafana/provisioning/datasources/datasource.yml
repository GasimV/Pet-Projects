# Grafana Datasource Provisioning — FactoryPulse
# =================================================

apiVersion: 1

datasources:
  # --- Prometheus (default) ---
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"

  # --- ClickHouse (grafana-clickhouse-datasource plugin) ---
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    editable: false
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      username: default
      defaultDatabase: factory_pulse
    secureJsonData:
      password: clickhouse
