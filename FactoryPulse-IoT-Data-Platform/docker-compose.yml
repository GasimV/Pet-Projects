# FactoryPulse IoT Data Platform — Docker Compose
# ================================================
# Usage:
#   make up          — start core stack (Kafka-based streaming with Spark)
#   make up-flink    — start with Flink overlay instead
#   make down        — stop everything
#
# Architecture layers:
#   Ingest:    Kafka (streaming) + MinIO (batch files)
#   Process:   Spark Structured Streaming (speed layer) + Spark Batch (batch layer)
#   Store:     MinIO/Iceberg (data lake) → ClickHouse (warehouse)
#   Transform: dbt-core (ELT in ClickHouse)
#   Serve:     Feast/Redis (features) + Qdrant (vectors) + FastAPI (REST)
#   Govern:    Great Expectations (quality) + Marquez (lineage)
#   Observe:   Prometheus + Grafana (dashboards)
#   ML:        MLflow (experiment tracking)

x-common-env: &common-env
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  KAFKA_BROKER: kafka:9092

services:
  # ==============================================================
  #  MESSAGE BROKER — Kafka + Zookeeper
  # ==============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: echo srvr | nc localhost 2181 | grep Zookeeper
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: kafka
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server kafka:9092 --list || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ==============================================================
  #  OBJECT STORAGE — MinIO (S3-compatible)
  # ==============================================================
  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-03-13T23-51-57Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/factory-raw &&
        mc mb --ignore-existing local/factory-curated &&
        mc mb --ignore-existing local/mlflow-artifacts &&
        echo 'MinIO buckets created' &&
        exit 0
      "

  # ==============================================================
  #  ICEBERG REST CATALOG
  # ==============================================================
  iceberg-rest:
    image: tabulario/iceberg-rest:1.5.0
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3a://factory-curated/iceberg
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: us-east-1
    depends_on:
      minio:
        condition: service_healthy

  # ==============================================================
  #  PROCESSING — Spark (master + streaming)
  # ==============================================================
  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    ports:
      - "8080:8080"    # Spark UI
      - "7077:7077"    # Spark master
      - "4040:4040"    # Spark job UI
    environment:
      <<: *common-env
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      AWS_REGION: us-east-1
    volumes:
      - ./spark:/opt/spark-apps
      - spark-warehouse:/opt/spark/warehouse
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ==============================================================
  #  WAREHOUSE — ClickHouse
  # ==============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.2
    ports:
      - "8123:8123"    # HTTP
      - "9009:9000"    # Native (remapped to avoid MinIO conflict)
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-factory_pulse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ==============================================================
  #  TRANSFORM — dbt-core (ClickHouse)
  # ==============================================================
  dbt:
    build:
      context: ./dbt
      dockerfile: Dockerfile
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - ./dbt:/usr/app/dbt
    depends_on:
      clickhouse:
        condition: service_healthy
    profiles:
      - dbt

  # ==============================================================
  #  FEATURE STORE — Feast + Redis
  # ==============================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping | grep PONG
      interval: 10s
      timeout: 3s
      retries: 5

  feast:
    build:
      context: ./feast
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
    volumes:
      - ./feast:/app/feast
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    profiles:
      - feast

  # ==============================================================
  #  VECTOR DATABASE — Qdrant
  # ==============================================================
  qdrant:
    image: qdrant/qdrant:v1.8.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /readyz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================================
  #  API — FastAPI
  # ==============================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-factory_pulse}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MLFLOW_TRACKING_URI: http://mlflow:5000
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    volumes:
      - ./api:/app
      - model-cache:/root/.cache
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ==============================================================
  #  SIMULATOR — IoT Sensor Data Generator
  # ==============================================================
  simulator:
    build:
      context: ./simulators
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      KAFKA_TOPIC_TELEMETRY: ${KAFKA_TOPIC_TELEMETRY:-factory.telemetry.raw}
      KAFKA_TOPIC_INCIDENTS: ${KAFKA_TOPIC_INCIDENTS:-factory.incidents}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-factory-raw}
      SIMULATOR_DEVICE_COUNT: ${SIMULATOR_DEVICE_COUNT:-10}
      SIMULATOR_INTERVAL_MS: ${SIMULATOR_INTERVAL_MS:-2000}
      SIMULATOR_ANOMALY_RATE: ${SIMULATOR_ANOMALY_RATE:-0.05}
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ==============================================================
  #  ORCHESTRATION — Airflow
  # ==============================================================
  airflow-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U airflow
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    entrypoint: >
      /bin/bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@factory.local || true
      "
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-81HqDtbqAywKSOumSha3BhWNOdQ26j4B9FGHspB8eMQ=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-factory-pulse-secret}
      AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type":"http","url":"http://marquez-api:5000","endpoint":"api/v1/lineage"}'
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    command: airflow webserver
    ports:
      - "8082:8080"
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    command: airflow scheduler
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ==============================================================
  #  DATA QUALITY — Great Expectations (runs via API container)
  # ==============================================================
  # Great Expectations runs inside the api container — see ge_validate.py

  # ==============================================================
  #  LINEAGE — Marquez (OpenLineage backend)
  # ==============================================================
  marquez-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    volumes:
      - marquez-pg-data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - postgres
    healthcheck:
      test: pg_isready -U marquez
      interval: 10s
      timeout: 5s
      retries: 5

  marquez-api:
    image: marquezproject/marquez:0.47.0
    ports:
      - "5001:5000"    # Marquez API
      - "5002:5001"    # Marquez admin
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    depends_on:
      marquez-db:
        condition: service_healthy

  marquez-web:
    image: marquezproject/marquez-web:0.47.0
    ports:
      - "3001:3000"
    environment:
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
    depends_on:
      - marquez-api

  # ==============================================================
  #  ML — MLflow
  # ==============================================================
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    ports:
      - "5050:5000"
    environment:
      <<: *common-env
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow-artifacts/
    volumes:
      - mlflow-data:/mlflow
    depends_on:
      minio:
        condition: service_healthy

  # ==============================================================
  #  OBSERVABILITY — Prometheus + Grafana
  # ==============================================================
  prometheus:
    image: prom/prometheus:v2.50.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  grafana:
    image: grafana/grafana:10.3.3
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

# ==============================================================
#  VOLUMES
# ==============================================================
volumes:
  zookeeper-data:
  kafka-data:
  minio-data:
  clickhouse-data:
  redis-data:
  qdrant-data:
  spark-warehouse:
  airflow-pg-data:
  airflow-logs:
  marquez-pg-data:
  mlflow-data:
  prometheus-data:
  grafana-data:
  model-cache:
