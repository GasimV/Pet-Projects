# Flink overlay — use with: docker compose -f docker-compose.yml -f docker-compose.flink.yml up
# Replaces Spark Structured Streaming with Flink for the speed layer (Kappa-style).
services:
  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_TELEMETRY: ${KAFKA_TOPIC_TELEMETRY:-factory.telemetry.raw}
      MINIO_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./flink:/opt/flink-apps
    depends_on:
      kafka:
        condition: service_healthy

  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
    depends_on:
      - flink-jobmanager
    deploy:
      replicas: 1
